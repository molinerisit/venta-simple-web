spring:
  application:
    name: panel-ventasimple

  # ── Base de datos (dev usa H2, prod usa PostgreSQL) ──────────
  datasource:
    url: jdbc:h2:file:./data/paneldev;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gestiona el schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

# ── JWT ─────────────────────────────────────────────────────────
app:
  jwt:
    secret: "VS-PANEL-SECRET-CHANGE-ME-IN-PRODUCTION-MIN-256BITS"
    expiration-ms: 86400000      # 24 horas

  # Heartbeat: instalación se considera offline si supera este umbral
  heartbeat-timeout-minutes: 10

---
# ── Perfil producción (activar con --spring.profiles.active=prod)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
